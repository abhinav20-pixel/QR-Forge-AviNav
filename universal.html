<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal QR Generator - QR Forge - AviNav</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <nav class="navbar clay-panel">
        <div class="container nav-content">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-qrcode"></i> QR Forge - AviNav
            </a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="upi.html" class="nav-link">UPI</a>
                <a href="whatsapp.html" class="nav-link">WhatsApp</a>
                <a href="wifi.html" class="nav-link">WiFi</a>
                <a href="universal.html" class="nav-link active">Universal</a>
            </div>
            <button class="mobile-menu-btn"><i class="fa-solid fa-bars"></i></button>
        </div>
    </nav>

    <main class="container">
        <div class="generator-layout">
            <!-- Form Section -->
            <div class="generator-form-panel clay-panel fade-in-up">
                <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
                    <div class="card-icon" style="margin: 0;"><i class="fa-solid fa-link"></i></div>
                    <h2>Universal QR</h2>
                </div>

                <div class="tabs">
                    <button class="tab-btn active" data-tab="tab-text"><i class="fa-solid fa-align-left"></i>
                        Text</button>
                    <button class="tab-btn" data-tab="tab-url"><i class="fa-solid fa-link"></i> URL</button>
                    <button class="tab-btn" data-tab="tab-image"><i class="fa-solid fa-image"></i> Image Link</button>
                </div>

                <form id="uniForm">
                    <!-- Text Tab -->
                    <div id="tab-text" class="tab-content active">
                        <div class="form-group">
                            <label for="uniText">Plain Text *</label>
                            <textarea id="uniText" class="clay-input" rows="4"
                                placeholder="Enter any text here..."></textarea>
                        </div>
                    </div>

                    <!-- URL Tab -->
                    <div id="tab-url" class="tab-content">
                        <div class="form-group">
                            <label for="uniUrl">Website URL *</label>
                            <input type="url" id="uniUrl" class="clay-input" placeholder="https://example.com">
                        </div>
                    </div>

                    <!-- Image Link Tab -->
                    <div id="tab-image" class="tab-content">
                        <div class="form-group">
                            <label for="uniImage">Image URL *</label>
                            <input type="url" id="uniImage" class="clay-input"
                                placeholder="https://example.com/image.jpg">
                            <small style="color:var(--text-muted); display:block; margin-top:5px;">This will generate a
                                QR code that redirects to the image link.</small>
                        </div>
                    </div>

                    <div class="form-group" style="margin-top: 25px;">
                        <label>Customization</label>
                        <div class="color-picker-group clay-panel-deep" style="padding: 15px; border-radius: 15px;">
                            <div style="display:flex; align-items:center; gap: 10px;">
                                <input type="color" id="qrColor" class="color-input" value="#000000">
                                <span style="font-weight: 500;">QR Color</span>
                            </div>
                            <div style="display:flex; align-items:center; gap: 10px; margin-left: 20px;">
                                <input type="color" id="qrBgColor" class="color-input" value="#ffffff">
                                <span style="font-weight: 500;">Background</span>
                            </div>
                        </div>
                    </div>

                    <div style="display:flex; gap: 15px; margin-top: 30px;">
                        <button type="button" id="generateUniBtn" class="clay-btn secondary clay-btn-fluid"
                            style="flex: 1;"><i class="fa-solid fa-wand-magic-sparkles"></i> Generate QR</button>
                    </div>
                </form>
            </div>

            <!-- Preview Section -->
            <div class="generator-preview-panel fade-in-up-delay-1">
                <div class="qr-box" id="qrcode">
                    <!-- QR code will be generated here -->
                </div>

                <div class="qr-actions">
                    <button class="clay-btn primary" id="downloadBtn"><i class="fa-solid fa-download"></i>
                        Download</button>
                    <button class="clay-btn primary" id="copyBtn"><i class="fa-solid fa-copy"></i> Copy Data</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="js/script.js"></script>
</body>

</html>
